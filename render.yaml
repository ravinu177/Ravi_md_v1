services:
  - type: web
    name: ravi_md
    runtime: docker
    dockerfilePath: lib/Dockerfile
    envVars:
      - key: SESSION_ID
        value: ""
      - key: OWNER_NUMBER
        value: "94768223718"
      - key: BOT_NAME
        value: "RAVI_MD"
      - key: COMMAND_MODE
        value: "public"
      - key: TIMEZONE
        value: "Africa/Harare"
      - key: MONGO_URL
        value: ""
      - key: POSTGRES_URL
        value: ""
      - key: MYSQL_URL
        value: ""
      - key: DB_URL
        value: ""
    startCommand: npm run start:optimized
